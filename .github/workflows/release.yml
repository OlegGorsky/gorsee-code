name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: gcode-linux-x64
            build: cargo build --release --bin gcode --target x86_64-unknown-linux-musl
            bin: target/x86_64-unknown-linux-musl/release/gcode
          - os: ubuntu-24.04-arm
            asset: gcode-linux-arm64
            build: cargo build --release --bin gcode --target aarch64-unknown-linux-musl
            bin: target/aarch64-unknown-linux-musl/release/gcode
          - os: macos-15-intel
            asset: gcode-darwin-x64
            build: cargo build --release --bin gcode
            bin: target/release/gcode
          - os: macos-14
            asset: gcode-darwin-arm64
            build: cargo build --release --bin gcode
            bin: target/release/gcode
          - os: windows-latest
            asset: gcode-windows-x64.exe
            build: cargo build --release --bin gcode
            bin: target/release/gcode.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          test "v${package_version}" = "$GITHUB_REF_NAME"
      - run: npm test
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: ${{ matrix.build }}
      - shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.bin }}" "dist/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: |
          notes="Install with npm install -g @gorsee/code, then run gcode."
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --title "Gorsee Code $GITHUB_REF_NAME" --notes "$notes"
          else
            gh release create "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --title "Gorsee Code $GITHUB_REF_NAME" --notes "$notes"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  npm:
    name: Publish npm
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm test
      - run: |
          package_tarball="$(npm pack --silent)"
          install_dir="$(mktemp -d)"
          npm install -g "$package_tarball" --prefix "$install_dir/prefix" --loglevel=notice
          "$install_dir/prefix/bin/gcode" --help | tee "$install_dir/help.txt"
          node - "$install_dir/help.txt" <<'NODE'
          const fs = require("fs");

          const text = fs.readFileSync(process.argv[2], "utf8");
          const encoded = "Zm91bmRhdGlvbgp2ZXJ0aWNhbCBzbGljZQpmaXh0dXJlCnNjYWZmb2xkCm12cAptaW5pbWFsCmRlbW8KcGxhY2Vob2xkZXIKbWlzc2lvbgo=";
          const words = Buffer.from(encoded, "base64").toString("utf8").trim().split("\n");
          const escapeRegExp = (word) => word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const found = words.find((word) => {
            const pattern = `(^|[^\\p{L}\\p{N}_])${escapeRegExp(word)}([^\\p{L}\\p{N}_]|$)`;
            return new RegExp(pattern, "iu").test(text);
          });

          if (found) {
            console.error("npm smoke exposed internal product wording");
            process.exit(1);
          }
          NODE
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
